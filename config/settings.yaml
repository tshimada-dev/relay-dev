# Relay-Dev Configuration File
# Historical P1 improvement notes (2026-02-24):
# - State transition validation (auto-correction on phase mismatch)
# - Forbidden command guidance in prompts / operational policy
# - Test result verification (warns when test_output.log is missing after Phase6)
# - Config validation (type checking, timeout validation)

cli:
  command: "codex"
  flags: "--ask-for-approval never --model gpt-5.4 exec --skip-git-repo-check --sandbox workspace-write"
  implementer_command: ""
  implementer_flags: ""
  reviewer_command: ""
  reviewer_flags: ""

execution:
  # Keep the tracked default conservative. Use config/settings.local.yaml or
  # -ConfigFile with an example copy to opt into auto/parallel task execution.
  mode: single
  # 1 attempt が長引いたときに provider process を再起動する秒数。
  restart_after_sec: 6000
  # timeout restart を何回まで追加で試すか。1 = 初回 + 1 retry。
  max_retries: 1
  max_parallel_jobs: 1
  allow_single_parallel_job: false

watcher:
  poll_fallback_sec: 5

lock:
  retry_count: 30
  retry_delay_ms: 200
  timeout_sec: 300

log:
  directory: logs
  max_size_mb: 10
  rotation_count: 5

paths:
  project_dir: ".."
  # DESIGN.md path. Relative paths are resolved from paths.project_dir.
  design_file: "DESIGN.md"
  status_file: queue/status.yaml
  lock_file: queue/status.lock
  dashboard_file: dashboard.md
  task_file: tasks/task.md

human_review:
  enabled: true
  phases:
    - Phase3-1  # 設計書レビュー → ゲート: Phase4
    - Phase4-1  # タスク分解レビュー → ゲート: Phase5
    - Phase7    # PRレビュー → ゲート: Phase7-1
