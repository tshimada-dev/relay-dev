name: CI

on:
  push:
  pull_request:

jobs:
  pwsh-checks:
    name: PowerShell Checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PowerShell syntax check
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $files = Get-ChildItem -Path . -Recurse -File -Filter *.ps1
          $parseErrors = @()
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($file.FullName, [ref]$tokens, [ref]$errors)
            if ($errors) {
              $parseErrors += $errors | ForEach-Object { "$($file.FullName): $($_.Message)" }
            }
          }

          if ($parseErrors.Count -gt 0) {
            $parseErrors | ForEach-Object { Write-Host $_ -ForegroundColor Red }
            throw "Syntax check failed."
          }

          Write-Host "PowerShell syntax check passed."

      - name: Run regression tests
        shell: pwsh
        run: ./tests/regression.ps1

      - name: Run task parallelization tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tests = @(
            "tests/task-parallelization-prep.ps1",
            "tests/task-parallelization-ready-runstate.ps1",
            "tests/task-parallelization-ready-scheduler.ps1",
            "tests/task-parallelization-ready-recovery.ps1",
            "tests/task-parallelization-ready-ui.ps1",
            "tests/task-parallelization-scheduler.ps1",
            "tests/task-group-parallel-runstate.ps1",
            "tests/task-group-parallel-planning.ps1",
            "tests/task-group-parallel-package.ps1",
            "tests/task-group-parallel-worker-loop.ps1",
            "tests/task-group-parallel-coordinator.ps1",
            "tests/task-group-parallel-merge.ps1",
            "tests/task-group-parallel-artifacts.ps1",
            "tests/task-group-parallel-recovery.ps1",
            "tests/task-group-parallel-ui.ps1",
            "tests/task-group-parallel-sequencing.ps1",
            "tests/task-parallelization-headless-execution.ps1"
          )
          foreach ($test in $tests) {
            Write-Host "Running $test"
            & "./$test"
          }

      - name: Check public examples
        shell: pwsh
        run: ./scripts/check-public-examples.ps1
